name: qr_code_generator
description: A Flutter package for generating dynamic QR codes with custom colors and optional center images using CustomPainter.
version: 1.0.3
homepage: https://github.com/rasel2510/qr_code_generator
repository: https://github.com/rasel2510/qr_code_generator
issue_tracker: https://github.com/rasel2510/qr_code_generator/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  qr: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

topics:
  - qr-code
  - qr
  - barcode
  - generator
  - custompainter